name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate environment
        run: |
          python -m pip check
          python -m compileall conclave

      - name: Lint (ruff)
        run: ruff check conclave tests

      - name: Run tests (pytest + coverage)
        run: python -m pytest tests/ --cov=conclave --cov-report=term-missing:skip-covered --cov-fail-under=20 -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: UI logic tests (node)
        run: node --test tests/ui_state.test.js

      - name: CLI smoke test
        run: conclave --help

      - name: Demo smoke test
        run: python examples/demo.py --list
