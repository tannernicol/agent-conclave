<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Conclave</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/base.css" />
    <link rel="stylesheet" href="/static/chat.css" />
  </head>
  <body>
    <header class="chat-header">
      <div class="chat-brand">Conclave</div>
      <div class="agent-status-bar" id="agent-status"></div>
      <div class="header-tools">
        <button type="button" class="icon-btn" id="btn-history" title="Chat history">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 7h8M8 12h8M8 17h5"/></svg>
        </button>
        <button type="button" class="icon-btn" id="btn-settings" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <main class="chat-messages" id="messages">
      <div class="chat-empty" id="empty-state">
        <div class="chat-empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--ui-muted-2)" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        </div>
        <p>Start a conversation with the AI agents.</p>
        <p class="ui-muted">Use <kbd>@claude</kbd> <kbd>@codex</kbd> <kbd>@gemini</kbd> to mention specific agents, or message all at once.</p>
      </div>
    </main>

    <footer class="chat-footer">
      <div class="mention-bar" id="mention-bar"></div>
      <div class="input-row">
        <span class="user-label">User</span>
        <div class="input-wrap">
          <textarea id="message-input" rows="1" placeholder="Type a message... (use @name to mention agents)" autocomplete="off"></textarea>
        </div>
        <button type="button" class="icon-btn mic-btn" id="btn-mic" title="Voice input">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <button type="button" class="send-btn" id="btn-send">Send</button>
      </div>
      <div class="input-hints">
        Enter to send &middot; Shift+Enter for newline &middot; Paste/drop images &middot; Mic for voice &middot; <code>/continue</code> to resume after loop guard
      </div>
    </footer>

    <script src="/static/chat.js"></script>
  </body>
</html>
